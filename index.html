                    <div style="margin-top:4px;">错误次数: <span id="tea-mistakes" style="color:var(--text-danger);">${this.mistakes}/${this.maxMistakes}</span></div>
                </div>
            </div>
        `;
        document.getElementById('messages').appendChild(container);
        TerminalUI.scrollToBottom();
    },

    handleInput(text) {
        if (!this.isActive) return;
        const num = parseInt(text);
        if (isNaN(num) || num < 1 || num > this.steps.length) return;

        const expectedStep = this.currentStep;
        // The number maps to the step position in the original sequence
        if (num - 1 === expectedStep) {
            this.currentStep++;
            const doneEl = document.getElementById('tea-done');
            const progEl = document.getElementById('tea-progress');
            if (doneEl) doneEl.textContent = this.steps.slice(0, this.currentStep).join(' → ');
            if (progEl) progEl.textContent = `步骤 ${this.currentStep}/${this.steps.length}`;

            if (this.currentStep >= this.steps.length) {
                this.finish(true);
            }
        } else {
            this.mistakes++;
            const mistEl = document.getElementById('tea-mistakes');
            if (mistEl) mistEl.textContent = `${this.mistakes}/${this.maxMistakes}`;
            TerminalUI.showToast('顺序错误！', 'danger');
            if (this.mistakes >= this.maxMistakes) {
                this.finish(false);
            }
        }
    },

    finish(success) {
        this.isActive = false;
        let msg = success
            ? `\n礼仪完成！行云流水，毫无差错。\n\nProcess exited with code 0`
            : `\n礼仪失败...失误太多。\n正确顺序: ${this.steps.join(' → ')}\n\nProcess exited with code 1`;

        TerminalUI.addMessage('system', null, msg, false);
        if (success) GameState.modifyStat('charisma', 5);

        if (this.onComplete) {
            const cb = this.onComplete;
            this.onComplete = null;
            setTimeout(() => cb({ passed: success }), 800);
        }
    }
};

// Poison Mini-game - intercept poison in a stream of "code"
const PoisonGame = {
    isActive: false,
    stream: [],
    score: 0,
    total: 0,
    missed: 0,
    maxMissed: 3,
    interval: null,
    onComplete: null,
    streamEl: null,
    speed: 1500,

    async start(config) {
        this.isActive = true;
        this.score = 0;
        this.total = 0;
        this.missed = 0;
        this.speed = config.speed || 1500;
        this.onComplete = config.onComplete || null;

        await TerminalUI.addMessage('system', null, '$ tcpdump -i eth0 port 443 | grep "poison"\n\n监控网络流量中...发现可疑数据包！\n输入 "x" 拦截红色毒包，忽略绿色正常包。', false);
        await StoryEngine.sleep(800);
        this.render();
        this.startStream();
    },

    render() {
        const container = document.createElement('div');
        container.className = 'message';
        container.id = 'poison-container';
        container.innerHTML = `
            <div class="minigame-container">
                <div class="minigame-running">tcpdump -i eth0 --filter="suspicious"</div>
                <div class="minigame-header">
                    <span class="minigame-title">投毒拦截</span>
                    <span class="minigame-timer" id="poison-score">拦截:0 漏过:0/${this.maxMissed}</span>
                </div>
                <div class="minigame-body" id="poison-stream" style="height:150px;overflow:hidden;font-family:monospace;font-size:12px;background:var(--bg-primary);padding:8px;border-radius:4px;"></div>
                <div style="margin-top:8px;color:var(--text-accent);font-size:11px;">输入 "x" 拦截当前毒包 | 正常包会自动放行</div>
            </div>
        `;
        document.getElementById('messages').appendChild(container);
        this.streamEl = container.querySelector('#poison-stream');
        TerminalUI.scrollToBottom();
    },

    startStream() {
        const poisons = ['[POISON]砒霜_0x3F', '[POISON]鹤顶红_0xA2', '[POISON]断肠草_0x7E', '[POISON]见血封喉_0xC1'];
        const normals = ['[OK]tea_packet_0x01', '[OK]food_data_0x02', '[OK]water_clean_0x03', '[OK]medicine_0x04', '[OK]incense_0x05'];
        let rounds = 0;
        const maxRounds = 12;

        this.interval = setInterval(() => {
            if (!this.isActive || rounds >= maxRounds) {
                clearInterval(this.interval);
                if (this.isActive) this.finish();
                return;
            }

            const isPoison = Math.random() < 0.4;
            const item = isPoison
                ? poisons[Math.floor(Math.random() * poisons.length)]
                : normals[Math.floor(Math.random() * normals.length)];

            this.currentIsPoison = isPoison;
            this.total++;
            rounds++;

            const line = document.createElement('div');
            line.style.color = isPoison ? 'var(--text-danger)' : 'var(--text-success)';
            line.textContent = `>> ${item}`;
            line.className = 'current-packet';

            // Remove old "current" markers
            if (this.streamEl) {
                const old = this.streamEl.querySelector('.current-packet');
                if (old) old.style.opacity = '0.5';
                this.streamEl.appendChild(line);
                this.streamEl.scrollTop = this.streamEl.scrollHeight;
            }

            // Auto-advance: if poison not caught in time
            if (isPoison) {
                this.poisonTimeout = setTimeout(() => {
                    if (this.isActive && this.currentIsPoison) {
                        this.missed++;
                        this.currentIsPoison = false;
                        this.updateScore();
                        if (this.missed >= this.maxMissed) { clearInterval(this.interval); this.finish(); }
                    }
                }, this.speed - 200);
            }
        }, this.speed);
    },

    handleInput(text) {
        if (!this.isActive) return;
        if (text.toLowerCase() === 'x') {
            if (this.currentIsPoison) {
                this.score++;
                this.currentIsPoison = false;
                clearTimeout(this.poisonTimeout);
                TerminalUI.showToast('拦截成功！', 'success');
            } else {
                TerminalUI.showToast('误拦！那是正常包', 'danger');
            }
            this.updateScore();
        }
    },

    updateScore() {
        const el = document.getElementById('poison-score');
        if (el) el.textContent = `拦截:${this.score} 漏过:${this.missed}/${this.maxMissed}`;
    },

    finish() {
        clearInterval(this.interval);
        clearTimeout(this.poisonTimeout);
        this.isActive = false;

        const passed = this.missed < this.maxMissed;
        let msg = passed
            ? `\n监控结束。成功拦截 ${this.score} 个毒包！\n\n连接安全。Process exited with code 0`
            : `\n监控失败！漏过太多毒包。\n\nWARNING: System compromised. Code 1`;

        TerminalUI.addMessage('system', null, msg, false);
        if (this.score >= 5) GameState.unlockAchievement('poison_master');

        if (this.onComplete) {
            const cb = this.onComplete;
            this.onComplete = null;
            setTimeout(() => cb({ passed, score: this.score }), 800);
        }
    }
};

// Escape Mini-game - navigate a text maze
const EscapeGame = {
    isActive: false,
    maze: [],
    playerPos: { x: 0, y: 0 },
    exitPos: { x: 0, y: 0 },
    timeLimit: 30000,
    timer: null,
    timerStart: null,
    onComplete: null,
    moves: 0,

    mazes: [
        { map: [
            '###########',
            '#S..#.....#',
            '#.#.#.###.#',
            '#.#...#...#',
            '#.#####.#.#',
            '#.......#E#',
            '###########'
        ]},
        { map: [
            '#############',
            '#S..#.......#',
            '#.#.#.#####.#',
            '#.#.#.#...#.#',
            '#.#.#.#.#.#.#',
            '#.#...#.#...#',
            '#.#####.###.#',
            '#...........E',
            '#############'
        ]}
    ],

    async start(config) {
        this.isActive = true;
        this.moves = 0;
        this.timeLimit = config.timeLimit || 30000;
        this.onComplete = config.onComplete || null;

        const mazeData = this.mazes[Math.floor(Math.random() * this.mazes.length)];
        this.parseMaze(mazeData.map);

        await TerminalUI.addMessage('system', null, '$ find / -name "exit" -type d\n\n正在搜索逃脱路线...\n输入方向: w(上) s(下) a(左) d(右)', false);
        await StoryEngine.sleep(500);
        this.render();
        this.startTimer();
    },

    parseMaze(mapLines) {
        this.maze = mapLines.map(line => line.split(''));
        for (let y = 0; y < this.maze.length; y++) {
            for (let x = 0; x < this.maze[y].length; x++) {
                if (this.maze[y][x] === 'S') { this.playerPos = {x, y}; this.maze[y][x] = '.'; }
                if (this.maze[y][x] === 'E') { this.exitPos = {x, y}; this.maze[y][x] = '.'; }
            }
        }
    },

    render() {
        const container = document.createElement('div');
        container.className = 'message';
        container.id = 'escape-container';
        container.innerHTML = `
            <div class="minigame-container">
                <div class="minigame-running">find / -path "*/exit"</div>
                <div class="minigame-header">
                    <span class="minigame-title">紧急逃脱</span>
                    <span class="minigame-timer" id="escape-timer">${(this.timeLimit/1000).toFixed(0)}s</span>
                </div>
                <div class="minigame-body">
                    <pre id="escape-maze" style="font-size:13px;line-height:1.4;color:var(--text-primary);text-align:center;">${this.renderMaze()}</pre>
                    <div style="margin-top:8px;color:var(--text-muted);font-size:11px;">@ = 你  E = 出口  # = 墙</div>
                </div>
                <div class="progress-bar"><div class="progress-bar-fill" id="escape-progress" style="width:100%"></div></div>
            </div>
        `;
        document.getElementById('messages').appendChild(container);
        TerminalUI.scrollToBottom();
    },

    renderMaze() {
        return this.maze.map((row, y) => row.map((cell, x) => {
            if (x === this.playerPos.x && y === this.playerPos.y) return '@';
            if (x === this.exitPos.x && y === this.exitPos.y) return 'E';
            return cell;
        }).join('')).join('\n');
    },

    handleInput(text) {
        if (!this.isActive) return;
        const dir = text.toLowerCase();
        let dx = 0, dy = 0;
        if (dir === 'w' || dir === 'n') dy = -1;
        else if (dir === 's') dy = 1;
        else if (dir === 'a' || dir === 'w' && false) dx = -1;
        else if (dir === 'd' || dir === 'e') dx = 1;
        else if (dir === 'a') dx = -1;
        else return;

        const nx = this.playerPos.x + dx;
        const ny = this.playerPos.y + dy;

        if (ny >= 0 && ny < this.maze.length && nx >= 0 && nx < this.maze[ny].length && this.maze[ny][nx] !== '#') {
            this.playerPos = { x: nx, y: ny };
            this.moves++;
            const mazeEl = document.getElementById('escape-maze');
            if (mazeEl) mazeEl.textContent = this.renderMaze();

            if (nx === this.exitPos.x && ny === this.exitPos.y) {
                this.finish(true);
            }
        }
    },

    startTimer() {
        this.timerStart = Date.now();
        this.timer = setInterval(() => {
            const remaining = Math.max(0, this.timeLimit - (Date.now() - this.timerStart));
            const te = document.getElementById('escape-timer');
            const pe = document.getElementById('escape-progress');
            if (te) te.textContent = (remaining/1000).toFixed(0) + 's';
            if (pe) pe.style.width = (remaining/this.timeLimit*100) + '%';
            if (remaining <= 0) { clearInterval(this.timer); this.finish(false); }
        }, 200);
    },

    finish(success) {
        clearInterval(this.timer);
        this.isActive = false;
        const elapsed = ((Date.now() - this.timerStart) / 1000).toFixed(1);
        let msg = success
            ? `\n逃脱成功！用时 ${elapsed}s，${this.moves}步。\n\nfind: '/palace/secret/exit' found.`
            : `\n逃脱失败...时间耗尽。\n\nfind: timeout exceeded. Process killed.`;

        TerminalUI.addMessage('system', null, msg, false);
        if (success) GameState.modifyStat('combat', 3);

        if (this.onComplete) {
            const cb = this.onComplete;
            this.onComplete = null;
            setTimeout(() => cb({ passed: success, moves: this.moves }), 800);
        }
    }
};

// Chess Mini-game - simplified 3x3 strategy game
const ChessGame = {
    isActive: false,
    board: [],
    onComplete: null,
    playerTurn: true,

    async start(config) {
        this.isActive = true;
        this.board = [['.','.','.'],['.','.','.'],['.','.','.']]
        this.onComplete = config.onComplete || null;
        this.playerTurn = true;

        await TerminalUI.addMessage('system', null, '$ python chess_simulation.py\n\n棋局开始。你执黑(X)，对手执白(O)。\n输入坐标如 "1,1"（行,列）落子。', false);
        await StoryEngine.sleep(500);
        this.render();
    },

    render() {
        const container = document.createElement('div');
        container.className = 'message';
        container.id = 'chess-container';
        container.innerHTML = `
            <div class="minigame-container">
                <div class="minigame-running">python chess_simulation.py --player=X</div>
                <div class="minigame-header">
                    <span class="minigame-title">棋局推演</span>
                    <span id="chess-turn" style="color:var(--text-accent);">你的回合</span>
                </div>
                <div class="minigame-body">
                    <pre id="chess-board" style="font-size:16px;line-height:1.6;text-align:center;color:var(--text-primary);">${this.renderBoard()}</pre>
                    <div style="margin-top:8px;color:var(--text-muted);font-size:11px;">输入 "行,列" 落子（如 1,2 = 第1行第2列）</div>
                </div>
            </div>
        `;
        document.getElementById('messages').appendChild(container);
        TerminalUI.scrollToBottom();
    },

    renderBoard() {
        let s = '  1 2 3\n';
        this.board.forEach((row, i) => {
            s += (i+1) + ' ' + row.map(c => c === '.' ? '·' : c).join('|') + '\n';
            if (i < 2) s += '  ─┼─┼─\n';
        });
        return s;
    },

    handleInput(text) {
        if (!this.isActive || !this.playerTurn) return;
        const parts = text.split(',');
        if (parts.length !== 2) return;
        const r = parseInt(parts[0]) - 1;
        const c = parseInt(parts[1]) - 1;
        if (r < 0 || r > 2 || c < 0 || c > 2) return;
        if (this.board[r][c] !== '.') { TerminalUI.showToast('该位置已有棋子', 'danger'); return; }

        this.board[r][c] = 'X';
        this.updateBoard();

        if (this.checkWin('X')) { this.finish(true); return; }
        if (this.isFull()) { this.finish(false); return; }

        this.playerTurn = false;
        const turnEl = document.getElementById('chess-turn');
        if (turnEl) turnEl.textContent = '对手思考中...';

        setTimeout(() => {
            this.aiMove();
            this.updateBoard();
            if (this.checkWin('O')) { this.finish(false); return; }
            if (this.isFull()) { this.finish(true); return; }
            this.playerTurn = true;
            const te = document.getElementById('chess-turn');
            if (te) te.textContent = '你的回合';
        }, 800);
    },

    aiMove() {
        // Simple AI: try center, then corners, then sides
        const moves = [[1,1],[0,0],[0,2],[2,0],[2,2],[0,1],[1,0],[1,2],[2,1]];
        for (const [r,c] of moves) {
            if (this.board[r][c] === '.') { this.board[r][c] = 'O'; return; }
        }
    },

    updateBoard() {
        const el = document.getElementById('chess-board');
        if (el) el.textContent = this.renderBoard();
    },

    checkWin(player) {
        const b = this.board;
        for (let i = 0; i < 3; i++) {
            if (b[i][0]===player && b[i][1]===player && b[i][2]===player) return true;
            if (b[0][i]===player && b[1][i]===player && b[2][i]===player) return true;
        }
        if (b[0][0]===player && b[1][1]===player && b[2][2]===player) return true;
        if (b[0][2]===player && b[1][1]===player && b[2][0]===player) return true;
        return false;
    },

    isFull() { return this.board.every(r => r.every(c => c !== '.')); },

    finish(won) {
        this.isActive = false;
        let msg = won
            ? `\n你赢了这局棋！\n\nSimulation result: VICTORY`
            : `\n棋局失利。\n\nSimulation result: DEFEAT`;
        TerminalUI.addMessage('system', null, msg, false);
        if (won) GameState.modifyStat('talent', 3);

        if (this.onComplete) {
            const cb = this.onComplete;
            this.onComplete = null;
            setTimeout(() => cb({ passed: won }), 800);
        }
    }
};

        const riddle = this.riddles[Math.floor(Math.random() * this.riddles.length)];
        this.currentRiddle = riddle;

        TerminalUI.addMessage('npc', '令官', `第${this.round}轮：${riddle.q}`, false);
    },

    handleInput(text) {
        if (!this.isActive || !this.currentRiddle) return;

        const correct = this.currentRiddle.answers.some(a => text.includes(a) || a.includes(text));
        if (correct || text.length >= 5) {
            this.score++;
            TerminalUI.showToast('回答精彩！', 'success');
        } else {
            TerminalUI.showToast('罚酒一杯！', 'danger');
        }
        this.currentRiddle = null;
        setTimeout(() => this.nextRound(), 800);
    },

    finish() {
        this.isActive = false;
        const passed = this.score >= Math.ceil(this.maxRounds * 0.5);
        let msg = `\n酒令结束。得分: ${this.score}/${this.maxRounds}\n`;
        msg += passed ? '你在宴上应对自如，赢得满堂喝彩。' : '你略显生疏，但也算过关。';
        msg += '\n\nProcess exited.';
        TerminalUI.addMessage('system', null, msg, false);

        if (passed) GameState.modifyStat('charisma', 3);
        if (this.score === this.maxRounds) GameState.unlockAchievement('banquet_master');

        if (this.onComplete) {
            const cb = this.onComplete;
            this.onComplete = null;
            setTimeout(() => cb({ passed, score: this.score }), 800);
        }
    }
};

    checkAvailable() {
        const available = [];
        for (const [id, quest] of Object.entries(this.quests)) {
            if (GameState.quests.active.includes(id) || GameState.quests.completed.includes(id)) continue;
            if (this.meetsTrigger(quest.trigger)) {
                available.push(id);
            }
        }
        return available;
    },

    meetsTrigger(trigger) {
        if (!trigger) return true;
        if (trigger.chapter && GameState.player.chapter < trigger.chapter) return false;
        if (trigger.stats) {
            for (const [stat, min] of Object.entries(trigger.stats)) {
                if (GameState.player.stats[stat] < min) return false;
            }
        }
        if (trigger.relationships) {
            for (const [npc, min] of Object.entries(trigger.relationships)) {
                if (!GameState.player.relationships[npc] || GameState.player.relationships[npc].value < min) return false;
            }
        }
        if (trigger.flags) {
            for (const [flag, val] of Object.entries(trigger.flags)) {
                if (!GameState.getFlag(flag)) return false;
            }
        }
        if (trigger.items) {
            for (const item of trigger.items) {
                if (!GameState.hasItem(item)) return false;
            }
        }
        return true;
    },

    activateQuest(id) {
        if (!this.quests[id]) return;
        GameState.addQuest(id);
    },

    completeQuest(id) {
        const quest = this.quests[id];
        if (!quest) return;
        GameState.completeQuest(id);
        if (quest.reward) {
            if (quest.reward.item) GameState.addItem(quest.reward.item);
            if (quest.reward.effects) StoryEngine.applyEffects(quest.reward.effects);
            if (quest.reward.setFlag) GameState.setFlag(quest.reward.setFlag, true);
        }
    }
};

            options: ['古道西风瘦马', '夕阳西下断肠人在天涯', '孤村落日残霞', '轻烟老树寒鸦']
        }
    ],

    getRandom(difficulty) {
        const pool = this[difficulty] || this.easy;
        return pool[Math.floor(Math.random() * pool.length)];
    },

    getSet(difficulty, count) {
        const pool = [...(this[difficulty] || this.easy)];
        const result = [];
        for (let i = 0; i < count && pool.length > 0; i++) {
            const idx = Math.floor(Math.random() * pool.length);
            result.push(pool.splice(idx, 1)[0]);
        }
        return result;
    }
};

// Main App Entry Point
const App = {
    init() {
        GameState.init();
        TerminalUI.init();
        Sidebar.init();
        StatusBar.init();

        this.checkExistingSave();

        // Track time for achievements
        setInterval(() => {
            GameState.checkTimeAchievements();
        }, 60000);

        // Focus input on load
        setTimeout(() => {
            document.getElementById('input').focus();
        }, 100);

        // Refocus input when clicking chat area
        document.querySelector('.chat-area').addEventListener('click', (e) => {
            if (!e.target.closest('.choice-item') && !e.target.closest('.poetry-option')) {
                document.getElementById('input').focus();
            }
        });
    },

    checkExistingSave() {
        const autoSave = (() => {
            try { return JSON.parse(localStorage.getItem(SaveLoad.AUTO_KEY)); } catch { return null; }
        })();

        if (autoSave) {
            TerminalUI.addMessage('system', null,
                '═══════════════════════════════════════\n' +
                '     后 宫 · 终 端 纪\n' +
                '     Palace Terminal v1.0.0\n' +
                '═══════════════════════════════════════\n\n' +
                '检测到存档。\n\n' +
                '  1. 继续游戏 (读取自动存档)\n' +
                '  2. 新游戏\n' +
                '  3. 读取其他存档 (/load)\n',
                false
            );
            StoryEngine.isWaitingForInput = true;
            StoryEngine.currentChoices = [
                { text: '继续游戏', available: true },
                { text: '新游戏', available: true },
                { text: '读取存档', available: true }
            ];

            const origHandler = TerminalUI.handleInput.bind(TerminalUI);
            TerminalUI.handleInput = (text) => {
                const num = parseInt(text);
                if (num === 1) {
                    TerminalUI.handleInput = origHandler;
                    StoryEngine.isWaitingForInput = false;
                    SaveLoad.load('auto');
                    TerminalUI.clearMessages();
                    StatusBar.update();
                    Sidebar.update();
                    TerminalUI.addMessage('system', null, '存档已读取。继续你的后宫之路...\n', false);
                    if (GameState.currentNode) {
                        StoryEngine.playNode(GameState.currentNode);
                    }
                } else if (num === 2) {
                    TerminalUI.handleInput = origHandler;
                    StoryEngine.isWaitingForInput = false;
                    this.startNewGame();
                } else if (num === 3) {
                    TerminalUI.handleInput = origHandler;
                    StoryEngine.isWaitingForInput = false;
                    TerminalUI.doLoad('');
                } else {
                    origHandler(text);
                }
            };
        } else {
            this.startNewGame();
        }
    },

    startNewGame() {
        StoryEngine.startNewGame();
    }
};

// Start when DOM is ready
document.addEventListener('DOMContentLoaded', () => {
    App.init();
});
